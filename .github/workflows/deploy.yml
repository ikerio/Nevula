name: Deploy to GitHub Pages

# Triggers: every push to main, plus a manual button in the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by actions/deploy-pages — Pages needs write access to publish
# and an OIDC token to prove the artifact came from this workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy in flight at a time. If a newer commit lands
# mid-deploy, queue it rather than cancel — Pages reaches eventual
# consistency cleaner that way.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nevula — Intro Cinematic Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #e6e8ef; --ink-100: #0a0f1f; --ink-200: #1a2240;
        --ink-400: #6c778f; --brand-azul: #00529c; --brand-naranja: #ff6600;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body {
        background:
          radial-gradient(60% 45% at 18% 12%,  rgba(0, 82, 156, 0.22) 0%, transparent 60%),
          radial-gradient(55% 50% at 88% 38%,  rgba(0, 82, 156, 0.16) 0%, transparent 65%),
          radial-gradient(70% 55% at 50% 92%,  rgba(0, 82, 156, 0.14) 0%, transparent 60%),
          radial-gradient(90% 70% at 50% 50%,  #eef0f6 0%, #e2e5ed 60%, #d6d9e2 100%) fixed;
        font-family: 'Manrope', system-ui, sans-serif; color: var(--ink-200);
      }
      #field { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; z-index: 0; }
      /* exposure flash — a brief white lift on the detonation */
      #flash { position: fixed; inset: 0; z-index: 1; background: #fff; opacity: 0; pointer-events: none; }

      /* — Reveal UI (fades in after the V reforms) — */
      .reveal { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.9s ease; }
      .reveal.on { opacity: 1; }
      .reveal .eyebrow {
        position: absolute; top: 46%; left: 8%;
        font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.34em;
        text-transform: uppercase; color: var(--brand-naranja);
      }
      .reveal .head {
        position: absolute; top: calc(46% + 26px); left: 8%;
        font-weight: 300; font-size: clamp(28px, 4vw, 56px); color: var(--ink-100); line-height: 1.05;
      }
      .reveal .sub { position: absolute; top: calc(46% + 26px + 4.2vw + 18px); left: 8%; font-size: 15px; color: var(--ink-400); }
      .reveal .rail {
        position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 14px; align-items: flex-end;
      }
      .reveal .rail span { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--ink-400); text-transform: uppercase; }
      .reveal .rail span.active { color: var(--brand-naranja); }

      .hint {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none;
        font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
        color: var(--ink-400); transition: opacity 0.4s;
      }

      /* — tuning panel (same language as the particle proto) — */
      .panel {
        position: fixed; top: 22px; right: 22px; z-index: 3; width: 264px;
        background: rgba(244, 246, 250, 0.85); backdrop-filter: blur(14px) saturate(1.05);
        border: 1px solid rgba(10, 15, 31, 0.10); border-radius: 14px; padding: 15px;
        box-shadow: 0 18px 50px -20px rgba(10, 15, 31, 0.40); font-size: 12px;
        max-height: calc(100vh - 44px); overflow-y: auto;
      }
      .panel h3 { margin: 0 0 6px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-400); font-weight: 600; }
      .panel .prog { height: 4px; background: rgba(10,15,31,0.1); border-radius: 3px; margin: 8px 0 4px; overflow: hidden; }
      .panel .prog i { display: block; height: 100%; width: 0; background: var(--brand-naranja); }
      .panel .phase { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--brand-azul); margin-bottom: 10px; }
      .group-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brand-azul); margin: 12px 0 7px; }
      .row { margin-bottom: 10px; }
      .row label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-200); margin-bottom: 4px; font-weight: 500; }
      .row label .v { font-family: 'JetBrains Mono', monospace; color: var(--brand-azul); }
      input[type='range'] { width: 100%; accent-color: var(--brand-naranja); height: 3px; }
      .foot { display: flex; gap: 8px; margin-top: 12px; }
      .foot button { flex: 1; font-family: inherit; font-size: 11px; padding: 7px; border-radius: 7px; cursor: pointer; border: 1px solid rgba(10,15,31,0.14); background: rgba(255,255,255,0.6); color: var(--ink-200); }
      .foot button:hover { background: #fff; }
      .fps { font-family: 'JetBrains Mono', monospace; color: var(--ink-400); font-size: 11px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <canvas id="field"></canvas>
    <div id="flash"></div>

    <div class="reveal" id="reveal">
      <div class="eyebrow">00 — Nevula</div>
      <div class="head">Security<br />simplified.</div>
      <div class="sub">The orchestration platform for launching modern security solutions.</div>
      <div class="rail">
        <span class="active">00 Opening</span>
        <span>01 Platform</span>
        <span>02 How it works</span>
        <span>03 Plug &amp; Play</span>
      </div>
    </div>

    <div class="hint" id="hint">Click or scroll to begin</div>
    <aside class="panel" id="panel"></aside>

    <script type="module" src="./intro.ts"></script>
  </body>
</html>
